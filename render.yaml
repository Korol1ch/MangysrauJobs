services:
  - type: web
    name: mangystau-rabotaet
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render сам сгенерирует случайную строку
      - key: TELEGRAM_BOT_TOKEN
        sync: false           # Заполни вручную в Dashboard → Environment
      - key: ALLOWED_ORIGINS
        sync: false           # Заполни после деплоя (URL твоего сайта)
